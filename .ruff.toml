# Ruff configuration, aligned with Home Assistant core conventions.
target-version = "py312"
line-length = 88

[lint]
select = [
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "ICN",  # flake8-import-conventions
    "PGH",  # pygrep-hooks
    "PL",   # pylint
    "RUF",  # ruff-specific rules
    "SIM",  # flake8-simplify
    "UP",   # pyupgrade
    "W",    # pycodestyle warnings
]
ignore = [
    "PLR2004",  # magic value in comparison — pervasive in BLE/protocol code
    "RUF001",   # ambiguous unicode in strings — intentional Cyrillic (Russian UI)
    "RUF002",   # ambiguous unicode in docstrings — intentional Cyrillic
    "RUF003",   # ambiguous unicode in comments — intentional Cyrillic
]

[lint.per-file-ignores]
# Standalone reverse-engineering CLI (not part of the integration package):
# its closed-loop move is a single long control function by design.
"ergostol.py" = ["PLR0915"]

[lint.isort]
force-sort-within-sections = true
combine-as-imports = true
known-first-party = ["homeassistant"]

[lint.pylint]
max-args = 6
max-branches = 20
max-statements = 60
