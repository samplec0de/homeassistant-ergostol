name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
          args: "check --output-format=github"
      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.17"
          args: "format --check --diff"
